services:
  mysql:
    image: mysql:8.0
    container_name: seasearch_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: seasearch
      MYSQL_DATABASE: seasearch
      MYSQL_USER: seasearch
      MYSQL_PASSWORD: seasearch
    ports:
      - "3307:3306"
    volumes:
      - seasearch_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  seasearch_mysql_data:
